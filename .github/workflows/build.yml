name: Build ThaiClub APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Find APK
        run: find . -name "*.apk" -exec ls -lh {} \;

      - name: Send APK to Telegram
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            echo "Sending $APK to Telegram..."
            curl -s \
              -F "chat_id=1581134642" \
              -F "caption=🎰 ThaiClub AutoBet v3.2 APK (Native Android / Kotlin)

✅ 30s dual-trigger: 26s + 57s per minute
✅ JWT + Username/Password login
✅ All 6 timing settings editable
✅ Mirror / Opposite / Random Opposite
✅ Martingale / Anti-Martingale
✅ Accurate per-round P/L
✅ Stop Profit / Stop Loss
✅ Bet History table
✅ Live log + progress bar" \
              -F "document=@${APK}" \
              "https://api.telegram.org/bot8644786920:AAEFS_DpQRPTOx3YNdtivxMVkD51OHGiqVM/sendDocument"
          else
            echo "No APK found"
            curl -s -d "chat_id=1581134642" -d "text=❌ Build succeeded but no APK found!" \
              "https://api.telegram.org/bot8644786920:AAEFS_DpQRPTOx3YNdtivxMVkD51OHGiqVM/sendMessage"
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThaiClub-AutoBet-v3.2
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
