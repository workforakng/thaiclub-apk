name: Build ThaiClub APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TG_BOT: "8644786920:AAEFS_DpQRPTOx3YNdtivxMVkD51OHGiqVM"
  TG_CHAT: "1581134642"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show project structure
        run: |
          ls -la
          ls -la gradle/wrapper/
          java -version
          ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" -ls
          APK=$(find . -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "BUILD FAILED: No APK produced"
            exit 1
          fi
          echo "APK found: $APK"
          ls -lh "$APK"

      - name: Send APK to Telegram
        run: |
          APK=$(find . -name "*.apk" | head -1)
          curl -s \
            -F "chat_id=$TG_CHAT" \
            -F "caption=ThaiClub AutoBet v3.2 - Kotlin Native" \
            -F "document=@${APK}" \
            "https://api.telegram.org/bot${TG_BOT}/sendDocument"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThaiClub-AutoBet-v3.2
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Notify failure
        if: failure()
        run: |
          curl -s \
            -d "chat_id=$TG_CHAT" \
            -d "text=❌ ThaiClub APK build FAILED. Check: https://github.com/workforakng/thaiclub-apk/actions" \
            "https://api.telegram.org/bot${TG_BOT}/sendMessage"
