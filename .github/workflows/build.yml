name: Build ThaiClub APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip wget curl openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev ccache build-essential

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Install Python build tools
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 Cython==0.29.33 virtualenv

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-v4
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Accept all Android SDK licenses
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK/licenses
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a\n" > $SDK/licenses/android-sdk-license
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $SDK/licenses/android-sdk-preview-license
          printf "\nd975f751698a77b662f1254ddbeed3901e976f5a\n" > $SDK/licenses/intel-android-extra-license
          printf "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d\n" > $SDK/licenses/android-googletv-license
          printf "\n601085b94cd77f0b54ff86406957099ebe79c4d5\n" > $SDK/licenses/android-sdk-arm-dbt-license
          printf "\n859f317696f67ef3d7f30a50a5560e7834b43903\n" > $SDK/licenses/google-gdk-license
          printf "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a\n" > $SDK/licenses/mips-android-sysimage-license

      - name: Pre-install cmdline-tools + accept licenses
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d cmdlinetools
          mkdir -p $SDK/cmdline-tools/latest
          cp -r cmdlinetools/cmdline-tools/* $SDK/cmdline-tools/latest/
          export PATH=$SDK/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$SDK --licenses 2>/dev/null || true
          yes | sdkmanager --sdk_root=$SDK "build-tools;33.0.2" "platforms;android-33" "platform-tools" || true

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log || true
          echo "=== APK search ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -lh bin/ 2>/dev/null || echo "No bin/ folder"

      - name: Send APK to Telegram
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            echo "Sending $APK to Telegram..."
            curl -s -F chat_id=1581134642 \
              -F caption="🎰 ThaiClub AutoBet v3.2 APK%0A%0A✅ 30s dual-trigger: 26s+57s%0A✅ JWT + Login%0A✅ All settings%0A✅ Accurate P/L" \
              -F document=@"$APK" \
              "https://api.telegram.org/bot8644786920:AAEFS_DpQRPTOx3YNdtivxMVkD51OHGiqVM/sendDocument"
          else
            echo "No APK to send"
            curl -s -d chat_id=1581134642 \
              -d text="❌ APK build failed - no APK found. Check logs." \
              "https://api.telegram.org/bot8644786920:AAEFS_DpQRPTOx3YNdtivxMVkD51OHGiqVM/sendMessage"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ThaiClub-AutoBet-v3.2-APK
          path: |
            bin/*.apk
            *.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7
