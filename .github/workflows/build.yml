name: Build ThaiClub APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TG_BOT: "8644786920:AAEFS_DpQRPTOx3YNdtivxMVkD51OHGiqVM"
  TG_CHAT: "1581134642"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Show project structure
        run: |
          echo "=== Root ===" && ls -la
          echo "=== gradle/wrapper ===" && ls -la gradle/wrapper/
          echo "=== app/ ===" && ls -la app/
          echo "=== Java home ===" && echo $JAVA_HOME
          java -version

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100

      - name: Find APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null && echo "done" || echo "No APK found"

      - name: Send APK to Telegram
        if: always()
        run: |
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -f "$APK" ]; then
            echo "Found APK: $APK"
            curl -s \
              -F "chat_id=$TG_CHAT" \
              -F "caption=ThaiClub AutoBet v3.2 - Kotlin Native APK" \
              -F "document=@${APK}" \
              "https://api.telegram.org/bot${TG_BOT}/sendDocument"
          else
            echo "No APK - sending log snippet"
            curl -s \
              -d "chat_id=$TG_CHAT" \
              -d "text=Build step ran but no APK. Check GitHub Actions logs." \
              "https://api.telegram.org/bot${TG_BOT}/sendMessage"
          fi

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ThaiClub-AutoBet-v3.2
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30
