name: Build ThaiClub APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TG_BOT: "8644786920:AAEFS_DpQRPTOx3YNdtivxMVkD51OHGiqVM"
  TG_CHAT: "1581134642"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Find APK
        run: find . -name "*.apk" -exec ls -lh {} \;

      - name: Send APK to Telegram
        run: |
          APK=$(find . -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            curl -s \
              -F "chat_id=$TG_CHAT" \
              -F "caption=ThaiClub AutoBet v3.2 APK - Kotlin Native - 30s 26s+57s triggers" \
              -F "document=@${APK}" \
              "https://api.telegram.org/bot${TG_BOT}/sendDocument"
          else
            curl -s \
              -d "chat_id=$TG_CHAT" \
              -d "text=Build OK but no APK found - check logs" \
              "https://api.telegram.org/bot${TG_BOT}/sendMessage"
          fi

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ThaiClub-AutoBet-v3.2
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
